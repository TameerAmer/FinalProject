<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiVision - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- FontAwesome for Dark/Light Mode Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="welcome-banner">
        <h1>Welcome to OptiVision!</h1>
        <!-- Dark/Light Mode Toggle Button with Icon -->
        <button id="theme-toggle" aria-label="Toggle Dark/Light Mode">
            <i class="fas fa-moon" id="theme-icon"></i> <!-- Moon icon for dark mode -->
        </button>
    </div>

    <div class="container">
        <form action="{{ url_for('login_process') }}" method="post">
            <h2>Log In</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <input type="email" name="email" placeholder="Email*" required>
            <input type="password" name="password" placeholder="Password*" required>
            <button type="submit">Log In</button>
            <a href="{{ url_for('register') }}">Register</a>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
